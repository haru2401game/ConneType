<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ConneType Network</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

</head>

<body>

<div class="container">

<div id="clock"></div>

<div class="fade-in title">
    > CONNECTION ESTABLISHED
</div>

<div class="fade-in subtitle">
    ようこそ
</div>

<div class="fade-in line">
    > このページは「ConneType」をクリアした人だけがアクセスできます。
</div>

<div class="fade-in system">
    > 認証成功
</div>

<div class="fade-in system">
    > 接続を確認しました
</div>

<div class="fade-in system">
    > プレイしていただきありがとうございます
</div>


<div class="fade-in section">
    TEAM INFORMATION
</div>

<div class="line">
    制作メンバーについて
</div>

<a class="button" href="team.html">
    チーム紹介を見る
</a>


<div class="section">
    NETWORK LINKS
</div>

<div class="line">
    SNSや活動ページ
</div>

<a class="button" href="links.html">
    リンクを開く
</a>


<div class="section">
    SYSTEM LOG
</div>

<div class="line">
    ConneTypeの接続ログ
</div>

<a class="button" href="logs.html">
    ログを見る
</a>


<div class="section">
    SECRET DATA
</div>

<div class="line warning">
    警告：制限された領域です
</div>

<a class="button" href="secret.html">
    アクセスする
</a>


<hr>


<div class="message">
    ConneTypeのネットワークへようこそ<span class="cursor">_</span>

</div>
